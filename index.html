	<div id="globeViz" class="mask zoomTarget" data-targetsize="0.45" data-duration="600"></div>

  <script src="//unpkg.com/globe.gl"></script>

  <script>
    // Gen random data
    const N = 20;
    const arcsData = [...Array(N).keys()]
  
    .map(() => ({
      
      startLat: (Math.random() - 0.5) * 180,
      startLng: (Math.random() - 0.5) * 360,
      endLat: (Math.random() - 0.5) * 180,
      endLng: (Math.random() - 0.5) * 360,
      color: [['red', 'white', 'blue', 'green'][Math.round(Math.random() * 3)], ['red', 'gold', 'green', 'green'][Math.round(Math.random() * 3)]]
    }));

    Globe()
      //.globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      
      .globeImageUrl('Map.jpeg')
      
      .arcsData(arcsData)
      .arcColor('color')
      .arcDashLength(() => Math.random())
      .arcDashGap(() => Math.random())
      .arcDashAnimateTime(() => Math.random() * 4000 + 1000)
      
    (document.getElementById('globeViz'))
    document.body.style.zoom = "50%";
     // document.body.style.zoom = "20%";
    
    

  </script>
